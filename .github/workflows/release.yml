# Publishes to crates.io when a version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
# Needs the CARGO_REGISTRY_TOKEN repo secret (crates.io API token with
# publish-new + publish-update scopes). docs.rs builds automatically after.
name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules, for the spec suite)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Tag matches crate version
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "submilli-wasm") | .version')
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match Cargo.toml version v${version}" >&2
            exit 1
          fi

      - name: Test
        run: cargo test --locked

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
